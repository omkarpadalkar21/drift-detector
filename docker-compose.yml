# ============================================================
# Drift Detector — Docker Compose
# ============================================================
#
# Services:
#   ai-service  → FastAPI (Python) on port 8001
#   dashboard   → Next.js (Node.js) on port 3000
#
# Network:
#   Both services share the "drift-net" bridge network.
#   The dashboard reaches the ai-service at http://ai-service:8001
#   (server-side only — set via FASTAPI_BASE_URL).
#
# Secrets / config:
#   Copy .env.example → .env and fill in your values.
#   The compose file reads DATABASE_URL, BETTER_AUTH_SECRET,
#   GITHUB_CLIENT_ID, and GITHUB_CLIENT_SECRET from that file.
#
# Model cache:
#   The "ai_model_cache" named volume persists the Hugging Face
#   all-MiniLM-L6-v2 weights so they aren't re-downloaded on
#   every "docker compose up".
# ============================================================

services:

  # ----------------------------------------------------------
  # AI Service — FastAPI / uvicorn
  # ----------------------------------------------------------
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: drift-ai-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      # Hugging Face model cache — persisted in a named volume
      HF_HOME: /root/.cache/huggingface
    volumes:
      # Named volume keeps the sentence-transformers model between restarts
      - ai_model_cache:/root/.cache/huggingface
    networks:
      - drift-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s   # Allow time for model download on first boot

  # ----------------------------------------------------------
  # Dashboard — Next.js production server
  # ----------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        # Public build-time var — baked into the Next.js bundle
        NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    container_name: drift-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"

      # ---- Database ----
      DATABASE_URL: "${DATABASE_URL}"

      # ---- Better Auth ----
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      # Browser-facing URL (used by the auth SDK on the client side)
      BETTER_AUTH_URL: "http://localhost:3000"

      # ---- GitHub OAuth ----
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET}"

      # ---- AI Service connection (server-side only) ----
      # Uses the Docker internal hostname so server-side fetch
      # goes through the drift-net bridge — never leaves the host.
      FASTAPI_BASE_URL: "http://ai-service:8001"
    depends_on:
      ai-service:
        condition: service_healthy
    networks:
      - drift-net

# ============================================================
# Named Volumes
# ============================================================
volumes:
  ai_model_cache:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  drift-net:
    driver: bridge
